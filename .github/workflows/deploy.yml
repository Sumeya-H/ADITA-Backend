on:
  push:
    branches:
      - main

name: 🚀 Deploy Backend on Push

jobs:
  deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Write a fresh tmp/restart.txt so Passenger reloads after deploy
      - name: 🔄 Prepare restart trigger
        run: |
          mkdir -p tmp
          echo "${{ github.sha }} - ${{ github.event.head_commit.message }}" > tmp/restart.txt

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.BACKEND_FTP_SERVER }}
          username: ${{ secrets.BACKEND_FTP_USERNAME }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}
          local-dir: ./
          server-dir: /home/aditacoq/api.aditacademy.co/adita-backend/
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            **/*.pyc
            **/*.pyo
            **/.env.production
            **/db.sqlite3
            **/media/**
            **/logs/**
            **/staticfiles/**
            **/receipts/**
            **/stderr.log
            **/test_receipt.png
            **/test_register.py
            **/.github/**